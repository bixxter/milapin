<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e60023"/>
      <stop offset="100%" style="stop-color:#ad081b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Circle background — 96px diameter centered in 128px canvas (16px padding) -->
  <circle cx="64" cy="64" r="48" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- "milapin" text -->
  <text x="64" y="69" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="17.5" fill="#ffffff" letter-spacing="-0.5" dominant-baseline="central">milapin</text>
</svg>
