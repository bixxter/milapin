<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0b;
      color: #e8e8ed;
      padding: 16px;
      width: 260px;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .status {
      font-size: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.ok { background: #4ade80; }
    .dot.err { background: #f87171; }
    a {
      display: block;
      font-size: 12px;
      color: #6366f1;
      text-decoration: none;
      cursor: pointer;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Pinterest Grabber</h2>
  <div class="status" id="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Checking...</span>
  </div>
  <a id="optionsLink">Open Settings</a>
  <script src="popup.js"></script>
</body>
</html>
