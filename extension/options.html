<!DOCTYPE html>
<html>
<head>
  <title>Pinterest Grabber - Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0b;
      color: #e8e8ed;
      padding: 40px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #8b8b96;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2a2a2e;
      background: #131316;
      color: #e8e8ed;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2a2a2e;
      background: #1e1e22;
      color: #e8e8ed;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #2a2a2e;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <h1>Pinterest Grabber Settings</h1>

  <label for="apiKey">API Key</label>
  <input type="text" id="apiKey" placeholder="Your API key from Settings page">

  <button id="save">Save</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
